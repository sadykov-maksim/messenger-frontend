upstream app {
    server frontend:3000;
}

server {
    listen 80;
    server_name avocado-messenger.online *.avocado-messenger.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    if ($http_x_forwarded_proto = 'http') {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    listen 443 ssl;
    listen [::]:443;
    http2 on;

    server_name www.avocado-messenger.online;

    ssl_certificate     /etc/certificates/live/avocado-messenger.online/fullchain.pem;
    ssl_certificate_key /etc/certificates/live/avocado-messenger.online/privkey.pem;

    return 301 https://avocado-messenger.online$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443;
    http2 on;

    server_name avocado-messenger.online;

    #include /etc/nginx/snippets/cloudflare-real-ip.conf;

    #allow 203.188.174.213;
    #allow 192.168.0.143;
    #allow 109.195.103.84;
    #allow 104.18.25.239;
    #deny all;

    ssl_certificate     /etc/certificates/live/avocado-messenger.online/fullchain.pem;
    ssl_certificate_key /etc/certificates/live/avocado-messenger.online/privkey.pem;

    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Hide version
    server_tokens off;

    # Anti-DDoS
    limit_req             zone=general_limit burst=20 nodelay;
    limit_conn            conn_limit 20;
    limit_req_status      429;
    limit_conn_status     429;

    # Timeout
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     30s;
    send_timeout          10s;

    if ($scheme = 'http') {
        return 301 https://$host$request_uri;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
        proxy_pass http://app;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /etc/nginx/html;
        allow all;
    }

    error_page 403 /403.html;
    location = /403.html {
        root /etc/nginx/html;
        allow all;
    }

    error_page 429 /429.html;
    location = /429.html {
        root /etc/nginx/html;
        allow all;
    }

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
