name: messenger-frontend

x-build: &next-build
  context: .
  dockerfile: Dockerfile

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        cpus: "1.00"
        memory: 1G
      reservations:
        cpus: "0.20"
        memory: 256M

x-common-nginx: &common-nginx
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        cpus: "0.50"
        memory: 256M
      reservations:
        cpus: "0.05"
        memory: 64M

services:
  frontend:
    container_name: frontend
    build: *next-build
    init: true
    stop_grace_period: 30s
    <<: *common
    env_file:
      - frontend/.env.staging
    volumes:
      - ./certificates:/etc/certificates:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - service

  nginx:
    container_name: nginx-frontend
    image: nginx:latest
    <<: *common-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/logs:/var/log/nginx
      - ./certificates:/etc/certificates:ro
      - certbot_webroot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 5s

      retries: 3
      start_period: 10s
    networks:
      - service

  certbot:
    container_name: certbot
    image: certbot/dns-cloudflare:latest
    volumes:
      - ./certificates:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - service

volumes:
  certbot_webroot:

networks:
  service:
    driver: bridge